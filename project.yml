name: TVSharedLists
options:
  bundleIdPrefix: com.jamesbaker
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "12.0.0"

targets:
  TVSharedLists:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - TVSharedLists
    resources:
      - path: TVSharedLists/Info.plist
      - path: TVSharedLists/Assets.xcassets
      - path: TVSharedLists/Preview Content
    dependencies:
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesbaker.TVSharedLists
        DEVELOPMENT_TEAM: 4PDB3TQD2G
        SWIFT_VERSION: "5.0"
        INFOPLIST_FILE: TVSharedLists/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "2.1"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # AdMob App ID. Defaults to Google's test App ID.
        # Override in Secrets.xcconfig locally or via ADMOB_APP_ID env var in CI.
        GAD_APP_ID: "ca-app-pub-3940256099942544~1458002511"
